main_agent:
  prompt:
    agent_type: main
    tool_format: xml
    presets: []
    custom_system_template: mindmap_agent_system

  llm:
    provider_class: "ClaudeOpenRouterClient"
    model_name: "anthropic/claude-opus-4"
    async_client: true
    temperature: 0.3
    top_p: 0.95
    min_p: 0.0
    top_k: -1
    max_tokens: 16000
    timeout: 1200
    retry_max_attempts: 3
    retry_strategy: "exponential"
    retry_multiplier: 2
    retry_wait_seconds: 5
    openrouter_api_key: "${oc.env:OPENROUTER_API_KEY}"
    openrouter_base_url: "${oc.env:OPENROUTER_BASE_URL,https://openrouter.ai/api/v1}"
    openrouter_provider: ""
    enable_streaming: true
    disable_cache_control: false
    keep_tool_result: 5
    oai_tool_thinking: false

  tool_config:
    - tool-mindmap-manager
    - tool-searching-serper

  max_turns: 30
  max_tool_calls_per_turn: 5
  keep_tool_result: 5

  deep_research:
    enabled: false

  monitoring:
    stall_timeout: 600
    max_total_timeout: 1800

  input_process:
    hint_generation: false
  output_process:
    final_answer_extraction: false

  add_message_id: true
  chinese_context: true

sub_agents: null

benchmark:
  name: ""

output_dir: logs/
